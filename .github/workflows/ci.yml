name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      # Core install only: the metrics, alignment, clustering, and mixture
      # logic is tested without the model backends, so CI stays minutes-free
      # of torch downloads.
      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest
